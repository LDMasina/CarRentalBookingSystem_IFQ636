name: CI/CD Pipeline -- Car Rental Booking System

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Write backend .env
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" > ./backend/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> ./backend/.env
          echo "PORT=${{ secrets.PORT }}" >> ./backend/.env
          echo "NODE_ENV=${{ secrets.NODE_ENV }}" >> ./backend/.env

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./frontend
        env:
          NODE_OPTIONS: --max_old_space_size=512

      - name: Deploy backend with pm2
        run: |
          pm2 stop backend || true
          pm2 start ./backend/server.js --name backend
          pm2 save

      - name: Deploy frontend with pm2
        run: |
          pm2 stop frontend || true
          pm2 start npx --name frontend -- serve -s ./frontend/public -l 3000
          pm2 save